<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>AKIFY 앱 설치하기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="/assets/analytics.js"></script>

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/app-icons/180.png" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="아키파이 | 악기 매물 보기" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:url" content="https://go.akify.io/install" />
    <meta property="og:title" content="AKIFY 앱 설치하기" />
    <meta property="og:description" content="휴대폰 카메라로 QR을 스캔하거나 스토어에서 AKIFY 앱을 설치하세요." />
    <meta property="og:image" content="https://go.akify.io/assets/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AKIFY 앱 설치하기" />
    <meta name="twitter:description" content="휴대폰 카메라로 QR을 스캔하거나 스토어에서 AKIFY 앱을 설치하세요." />
    <meta name="twitter:image" content="https://go.akify.io/assets/opengraph.jpg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="/assets/styles.css" />

    <style>
      .leading-section {
        gap: 32px;
      }

      .title-group {
        gap: 4px;
      }

      .qr-container {
        width: 240px;
        height: 240px;
        padding: 16px;
        background: var(--color-neutral-white);
        border-radius: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .qr-container canvas,
      .qr-container img {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      .footer .browse-link {
        font-family: var(--font-pretendard);
        font-size: 12px;
        font-weight: 500;
        line-height: 16px;
        color: var(--color-neutral-white);
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 8px;
        background: var(--color-alpha-white-05);
        transition: background 0.15s;
      }

      .footer .browse-link:hover {
        background: var(--color-alpha-white-10);
      }
    </style>

    <script>
      (function () {
        var ua = navigator.userAgent || '';
        var isIOS = /iPhone|iPad|iPod/i.test(ua);
        var isAndroid = /Android/i.test(ua);
        if (!isIOS && !isAndroid) return;
        var search = window.location.search;
        if (isIOS) {
          window.location.replace('https://apps.apple.com/kr/app/%EC%95%84%ED%82%A4%ED%8C%8C%EC%9D%B4/id6751454780' + search);
        } else {
          var androidUrl = 'https://play.google.com/store/apps/details?id=com.jammering.akify';
          if (search) {
            androidUrl += '&referrer=' + encodeURIComponent(search.substring(1));
          }
          window.location.replace(androidUrl);
        }
      })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        var qrContainer = document.getElementById("qr");
        if (qrContainer && window.QRCode) {
          new QRCode(qrContainer, {
            text: window.location.href,
            width: 208,
            height: 208,
            colorDark: "#0a0a0a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M,
          });
        }

        var iosBtn = document.getElementById("ios-btn");
        var androidBtn = document.getElementById("android-btn");
        var browseBtn = document.getElementById("browse-btn");
        var search = window.location.search;

        if (iosBtn) {
          iosBtn.href = "https://apps.apple.com/kr/app/%EC%95%84%ED%82%A4%ED%8C%8C%EC%9D%B4/id6751454780" + search;
        }
        if (androidBtn) {
          var androidUrl = "https://play.google.com/store/apps/details?id=com.jammering.akify";
          if (search) {
            var utm = search.substring(1);
            androidUrl += "&referrer=" + encodeURIComponent(utm);
          }
          androidBtn.href = androidUrl;
        }
        if (browseBtn) {
          browseBtn.href = "https://akify.io" + search;
        }
      });
    </script>
  </head>
  <body>
    <noscript>
      <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=1202852544872046&ev=PageView&noscript=1" alt="" />
    </noscript>
    <div class="index">
      <div class="leading-section">
        <div class="head-group">
          <div class="logotype">
            <svg><use href="/assets/icons.svg#logotype" /></svg>
          </div>
        </div>

        <div class="title-group">
          <div class="title">AKIFY 앱 설치하기</div>
          <div class="description">휴대폰 카메라로 QR을 스캔하세요</div>
        </div>

        <div id="qr" class="qr-container"></div>

        <div class="button-group">
          <a class="btn btn-secondary" id="ios-btn" href="#">
            <svg class="icon-left"><use href="/assets/icons.svg#apple" /></svg>
            <div class="text-group">
              <span class="label">Apple</span>
              <span class="action">App Store</span>
            </div>
            <div class="chip">
              <svg><use href="/assets/icons.svg#arrow-up-right" /></svg>
            </div>
          </a>

          <a class="btn btn-secondary" id="android-btn" href="#">
            <svg class="icon-left"><use href="/assets/icons.svg#google-play" /></svg>
            <div class="text-group">
              <span class="label">Google</span>
              <span class="action">Play Store</span>
            </div>
            <div class="chip">
              <svg><use href="/assets/icons.svg#arrow-up-right" /></svg>
            </div>
          </a>
        </div>
      </div>

      <div class="footer">
        <a id="browse-btn" href="https://akify.io" class="browse-link">AKIFY 둘러보기 →</a>
        <div class="copyright">2026 Jammering™ All Rights reserved.</div>
        <a href="mailto:info@jammering.com" class="contact">문의: info@jammering.com</a>
      </div>
    </div>
  </body>
</html>
