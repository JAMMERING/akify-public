    <style>
      .leading-section {
        gap: 32px;
      }

      .title-group {
        gap: 4px;
      }

      .qr-container {
        width: 240px;
        height: 240px;
        padding: 16px;
        background: var(--color-neutral-white);
        border-radius: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .qr-container canvas,
      .qr-container img {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      .footer .browse-link {
        font-family: var(--font-pretendard);
        font-size: 12px;
        font-weight: 500;
        line-height: 16px;
        color: var(--color-neutral-white);
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 8px;
        background: var(--color-alpha-white-05);
        transition: background 0.15s;
      }

      .footer .browse-link:hover {
        background: var(--color-alpha-white-10);
      }

      body.no-qr .qr-container {
        display: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        document.body.classList.add('fallback-revealed');

        var ua = navigator.userAgent || "";
        var isIOS = /iPhone|iPad|iPod/i.test(ua);
        var isAndroid = /Android/i.test(ua);
        var isMobile = isIOS || isAndroid;
        var search = window.location.search;

        var iosBtn = document.getElementById("ios-btn");
        var androidBtn = document.getElementById("android-btn");
        var browseBtn = document.getElementById("browse-btn");

        if (iosBtn) {
          iosBtn.href = "https://apps.apple.com/kr/app/%EC%95%84%ED%82%A4%ED%8C%8C%EC%9D%B4/id6751454780" + search;
        }
        if (androidBtn) {
          var androidUrl = "https://play.google.com/store/apps/details?id=com.jammering.akify";
          if (search) {
            androidUrl += "&referrer=" + encodeURIComponent(search.substring(1));
          }
          androidBtn.href = androidUrl;
        }
        if (browseBtn) {
          browseBtn.href = "https://akify.io" + search;
        }

        if (isMobile) {
          document.body.classList.add('no-qr');
          var storeUrl = isIOS ? iosBtn.href : androidBtn.href;
          if (typeof window.akifyTrackedRedirect === 'function') {
            window.akifyTrackedRedirect(storeUrl);
          } else {
            requestAnimationFrame(function () {
              requestAnimationFrame(function () {
                window.location.replace(storeUrl);
              });
            });
          }
          return;
        }

        var qrContainer = document.getElementById("qr");
        if (qrContainer && window.QRCode) {
          buildQrText(function (text) {
            new QRCode(qrContainer, {
              text: text,
              width: 208,
              height: 208,
              colorDark: "#0a0a0a",
              colorLight: "#ffffff",
              correctLevel: QRCode.CorrectLevel.M,
            });
          });
        }
      });

      function buildQrText(callback) {
        var fallback = window.location.href;
        if (typeof window.akifyGetClientId !== 'function') {
          callback(fallback);
          return;
        }
        var done = false;
        var timer = setTimeout(function () {
          if (!done) { done = true; callback(fallback); }
        }, 2000);
        window.akifyGetClientId(function (cid) {
          if (done) return;
          done = true;
          clearTimeout(timer);
          if (!cid) return callback(fallback);
          var url = new URL(fallback);
          url.searchParams.set('_cid', cid);
          callback(url.toString());
        });
      }
    </script>
