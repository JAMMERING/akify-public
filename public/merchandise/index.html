<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>AKIFY 매물 보기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="/assets/analytics.js"></script>

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/app-icons/180.png" />

    <meta name="apple-itunes-app" content="app-id=6751454780" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="/assets/styles.css" />

    <script>
      (function() {
        const currentUrl = window.location.href;
        const metaTag = document.querySelector('meta[name="apple-itunes-app"]');
        if (metaTag) {
          metaTag.setAttribute('content', 'app-id=6751454780, app-argument=' + currentUrl);
        }
      })();
    </script>

    <style>
      .leading-section {
        gap: 48px;
      }

      .id-card {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 6px 12px;
        background: var(--color-neutral-900);
        border-radius: 8px;
        font-family: var(--font-pretendard);
        font-size: 12px;
        font-weight: 500;
        line-height: 16px;
        color: var(--color-neutral-600);
      }
    </style>

    <script>
      const WEB_BASE = "https://web.akify.io";
      const IOS_SCHEME_TIMEOUT_MS = 1500;
      const FALLBACK_REVEAL_MS = 5000;

      function parsePostId() {
        const match = window.location.pathname.match(/^\/merchandise\/([^/?#]+)/);
        return match ? decodeURIComponent(match[1]) : null;
      }

      function buildWebFallback(postId) {
        return postId
          ? `${WEB_BASE}/merchandise/${postId}${window.location.search}`
          : `${WEB_BASE}${window.location.search}`;
      }

      function detectEnv() {
        const ua = navigator.userAgent || "";
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);
        const isMobile = isAndroid || isIOS;
        return { isAndroid, isIOS, isMobile };
      }

      function init() {
        const { isAndroid, isIOS, isMobile } = detectEnv();
        const postId = parsePostId();
        const webFallback = buildWebFallback(postId);

        const idValue = document.getElementById("post-id");
        if (postId && idValue) {
          idValue.textContent = postId;
        }

        if (!isMobile) {
          window.location.replace(webFallback);
          return;
        }

        if (postId) {
          if (isIOS) {
            window.location.href = `akify://merchandise/${postId}`;
            setTimeout(() => {
              if (!document.hidden) {
                window.location.replace(webFallback);
              }
            }, IOS_SCHEME_TIMEOUT_MS);
          } else if (isAndroid) {
            const intentUrl = `intent://merchandise/${postId}#Intent;scheme=akify;package=com.jammering.akify;S.browser_fallback_url=${encodeURIComponent(webFallback)};end`;
            window.location.href = intentUrl;
          }
        }

        setTimeout(() => {
          if (!document.hidden) {
            document.body.classList.remove('loader-state');
          }
        }, FALLBACK_REVEAL_MS);

        const openAppBtn = document.getElementById("open-app-btn");
        const storeBtn = document.getElementById("store-btn");

        openAppBtn.onclick = () => {
          if (isIOS) {
            window.location.href = `akify://merchandise/${postId || ''}`;
            setTimeout(() => {
              if (!document.hidden) {
                window.location.replace(webFallback);
              }
            }, IOS_SCHEME_TIMEOUT_MS);
          } else if (isAndroid) {
            const intentUrl = `intent://merchandise/${postId || ''}#Intent;scheme=akify;package=com.jammering.akify;S.browser_fallback_url=${encodeURIComponent(webFallback)};end`;
            window.location.href = intentUrl;
          }
        };

        storeBtn.onclick = () => {
          window.location.href = webFallback;
        };
      }

      window.addEventListener("DOMContentLoaded", init);
    </script>
  </head>
  <body class="loader-state">
    <noscript>
      <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=1202852544872046&ev=PageView&noscript=1" alt="" />
    </noscript>
    <div class="loader-page">
      <img src="/assets/app-icons/120.png" alt="" />
      <div class="loader-text">
        <h1>아키파이</h1>
        <p>악기 거래를 위한 가장 확실한 방법</p>
      </div>
      <svg class="loader-spinner"><use href="/assets/icons.svg#loader-2" /></svg>
    </div>
    <div class="index">
      <!-- Leading Section -->
      <div class="leading-section">
        <div class="head-group">
          <!-- Logotype -->
          <div class="logotype">
            <svg><use href="/assets/icons.svg#logotype" /></svg>
          </div>
          <!-- ID Card -->
          <div class="id-card">
            <span>매물 ID :</span>
            <span id="post-id">알 수 없음</span>
          </div>
        </div>

        <!-- Title -->
        <div class="title-group">
          <div class="title">앱에서 매물 상세를 확인해 주세요!</div>
          <div class="description">아키파이 앱에서 매물 상세를 보기 위한 링크입니다.</div>
        </div>

        <!-- Buttons -->
        <div class="button-group">
          <!-- 앱에서 보기 -->
          <button class="btn btn-primary" id="open-app-btn">
            <div class="app-icon">
              <img src="/assets/app-icons/72.png" alt="AKIFY" />
            </div>
            <div class="text-group">
              <span class="label">AKIFY App</span>
              <span class="action">앱에서 보기</span>
            </div>
            <div class="chip">
              <svg><use href="/assets/icons.svg#arrow-up-right" /></svg>
            </div>
          </button>

          <!-- 앱 설치하고 매물 보기 -->
          <button class="btn btn-secondary" id="store-btn">
            <svg class="icon-left"><use href="/assets/icons.svg#shopping-bag" /></svg>
            <div class="text-group">
              <span class="label">Download</span>
              <span class="action">앱 설치하고 매물 보기</span>
            </div>
            <div class="chip">
              <svg><use href="/assets/icons.svg#download" /></svg>
            </div>
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <div class="copyright">2026 Jammering™ All Rights reserved.</div>
        <a href="mailto:info@jammering.com" class="contact">문의: info@jammering.com</a>
      </div>
    </div>
  </body>
</html>
