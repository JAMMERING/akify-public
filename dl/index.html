<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>AKIFY 앱 설치하기</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="/assets/analytics.js"></script>

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="아키파이 | 악기 매물 보기" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:title" content="AKIFY 앱 설치하기" />
    <meta property="og:description" content="휴대폰 카메라로 QR을 스캔하거나 스토어에서 AKIFY 앱을 설치하세요." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Poppins', 'Pretendard', system-ui, sans-serif;
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        color: white;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        overflow-x: hidden;
      }

      .index {
        width: 100%;
        max-width: 384px;
        min-height: 100vh;
        padding: 0 16px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        overflow: hidden;
      }

      .leading-section {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }

      .head-group {
        padding-top: 56px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .logotype svg {
        display: block;
        width: 144px;
        height: 32px;
      }

      .title-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 4px;
      }

      .title-group .title {
        font-family: 'Pretendard', sans-serif;
        font-size: 24px;
        font-weight: 700;
        line-height: 36px;
        color: white;
      }

      .title-group .description {
        font-family: 'Pretendard', sans-serif;
        font-size: 12px;
        font-weight: 400;
        line-height: 16px;
        background: linear-gradient(to right, #ffffff, #6D6D6D);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .qr-container {
        width: 240px;
        height: 240px;
        padding: 16px;
        background: white;
        border-radius: 16px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .qr-container canvas,
      .qr-container img {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      .button-group {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        position: relative;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        overflow: hidden;
        cursor: pointer;
        border: none;
        font-family: inherit;
        text-align: left;
        transition: transform 0.1s;
        text-decoration: none;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn-secondary {
        background: radial-gradient(circle at center, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 100%);
        outline: 1px solid rgba(255,255,255,0.1);
        outline-offset: -1px;
      }

      .btn .icon-left {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        color: #94969C;
      }

      .btn .text-group {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .btn .text-group .label {
        font-family: 'Poppins', sans-serif;
        font-size: 12px;
        font-weight: 300;
        line-height: 16px;
        color: #94969C;
      }

      .btn-secondary .text-group .action {
        font-family: 'Pretendard', sans-serif;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
        color: white;
      }

      .btn .chip {
        width: 28px;
        height: 28px;
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        flex-shrink: 0;
        background: radial-gradient(circle at center, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 100%);
        outline: 1px solid rgba(255,255,255,0.1);
        outline-offset: -1px;
      }

      .btn .chip svg {
        width: 20px;
        height: 20px;
        color: #C1C2C5;
      }

      .footer {
        padding-bottom: 56px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .footer .browse-link {
        font-family: 'Pretendard', sans-serif;
        font-size: 12px;
        font-weight: 500;
        line-height: 16px;
        color: white;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 8px;
        background: rgba(255,255,255,0.05);
        transition: background 0.15s;
      }

      .footer .browse-link:hover {
        background: rgba(255,255,255,0.1);
      }

      .footer .copyright,
      .footer .contact {
        font-family: 'Pretendard', sans-serif;
        font-size: 12px;
        font-weight: 400;
        line-height: 16px;
        color: #94969C;
        text-decoration: none;
      }

      .footer .contact:hover {
        text-decoration: underline;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
      window.addEventListener("DOMContentLoaded", function () {
        var qrContainer = document.getElementById("qr");
        if (qrContainer && window.QRCode) {
          new QRCode(qrContainer, {
            text: window.location.href,
            width: 208,
            height: 208,
            colorDark: "#0a0a0a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M,
          });
        }

        var iosBtn = document.getElementById("ios-btn");
        var androidBtn = document.getElementById("android-btn");
        var browseBtn = document.getElementById("browse-btn");
        var search = window.location.search;

        if (iosBtn) {
          iosBtn.href = "https://apps.apple.com/kr/app/%EC%95%84%ED%82%A4%ED%8C%8C%EC%9D%B4/id6751454780" + search;
        }
        if (androidBtn) {
          var androidUrl = "https://play.google.com/store/apps/details?id=com.jammering.akify";
          if (search) {
            var utm = search.substring(1);
            androidUrl += "&referrer=" + encodeURIComponent(utm);
          }
          androidBtn.href = androidUrl;
        }
        if (browseBtn) {
          browseBtn.href = "https://akify.io" + search;
        }
      });
    </script>
  </head>
  <body>
    <div class="index">
      <div class="leading-section">
        <div class="head-group">
          <div class="logotype">
            <svg width="150" height="32" viewBox="0 0 150 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g clip-path="url(#clip0)">
                <path d="M81.6176 0.551758H69.4853V31.4483H81.6176V0.551758Z" fill="#94969C"/>
                <path d="M31.8419 32C31.8419 32 31.9853 27.4648 31.9853 21.7269C31.9853 20.811 32.0404 17.7434 31.6213 14.3779C31.6213 14.3559 31.489 13.4069 31.489 13.4069C30.2537 5.80414 23.7243 0 15.8493 0C7.09191 0 0 7.16138 0 16C0 24.8386 7.09191 32 15.8493 32C18.5625 32 21.1103 31.3159 23.3382 30.1021L16.6103 16.7614L31.8419 32Z" fill="#94969C"/>
                <path d="M66.1765 0.551758C59.2831 0.551758 52.864 2.52693 47.4265 5.94762V0.551758H35.2941V31.4483H47.4265V26.0524C52.864 29.4731 59.2831 31.4483 66.1765 31.4483V16.7835H50.7353L66.1765 12.3697V0.551758Z" fill="#94969C"/>
                <path d="M115.809 0.551758C108.915 0.551758 102.496 2.549 97.0588 5.96969V0.551758H84.9265V31.4483H100.368V26.0524H115.809V16.7835H100.368L115.809 12.3697V0.551758Z" fill="#94969C"/>
                <path d="M138.529 0.551758L132.551 12.8111L134.118 0.551758H119.118C119.118 6.51038 120.816 12.0607 123.739 16.7724H119.118V31.4483C124.743 31.4483 130.015 29.9366 134.559 27.2993C143.989 21.9366 150.077 11.3987 150 0.551758H138.529Z" fill="#94969C"/>
              </g>
              <defs>
                <clipPath id="clip0">
                  <rect width="150" height="32" fill="white"/>
                </clipPath>
              </defs>
            </svg>
          </div>
        </div>

        <div class="title-group">
          <div class="title">AKIFY 앱 설치하기</div>
          <div class="description">휴대폰 카메라로 QR을 스캔하세요</div>
        </div>

        <div id="qr" class="qr-container"></div>

        <div class="button-group">
          <a class="btn btn-secondary" id="ios-btn" href="#">
            <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
            </svg>
            <div class="text-group">
              <span class="label">Apple</span>
              <span class="action">App Store</span>
            </div>
            <div class="chip">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M17 7l-10 10" /><path d="M8 7l9 0l0 9" /></svg>
            </div>
          </a>

          <a class="btn btn-secondary" id="android-btn" href="#">
            <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 20.5V3.499c0-.864.985-1.357 1.674-.835l11.659 8.501c.553.418.553 1.252 0 1.67l-11.659 8.5c-.689.523-1.674.03-1.674-.835z"/>
            </svg>
            <div class="text-group">
              <span class="label">Google</span>
              <span class="action">Play Store</span>
            </div>
            <div class="chip">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M17 7l-10 10" /><path d="M8 7l9 0l0 9" /></svg>
            </div>
          </a>
        </div>
      </div>

      <div class="footer">
        <a id="browse-btn" href="https://akify.io" class="browse-link">AKIFY 둘러보기 →</a>
        <div class="copyright">2026 Jammering™ All Rights reserved.</div>
        <a href="mailto:info@jammering.com" class="contact">문의: info@jammering.com</a>
      </div>
    </div>
  </body>
</html>
